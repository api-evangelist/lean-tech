aid: lean-tech
url: https://raw.githubusercontent.com/api-evangelist/lean-tech/refs/heads/main/apis.yml
apis:
  - aid: lean-tech:lean-authentication-api
    name: Lean Authentication API
    tags:
      - Authentication
      - OAuth
      - Open Banking
    humanURL: https://docs.leantech.me/docs/authentication
    properties:
      - url: https://docs.leantech.me/docs/authentication
        type: Documentation
      - url: openapi/lean-authentication-api-openapi.yml
        type: OpenAPI
    description: >-
      OAuth 2.0 client-credentials token issuance for Lean APIs. Generates API access tokens (scope=api) for
      server-to-server calls and customer-scoped access tokens (scope=customer.<customer_id>) for the LinkSDK.
      Production auth endpoint is auth.leantech.me; sandbox endpoints are regional (auth.sandbox.sa.leantech.me,
      auth.sandbox.ae.leantech.me).
  - aid: lean-tech:lean-customers-api
    name: Lean Customers API
    tags:
      - Customers
      - Open Banking
      - End Users
    humanURL: https://docs.leantech.me/reference/customers
    properties:
      - url: https://docs.leantech.me/reference/customers
        type: Documentation
      - url: openapi/lean-customers-api-openapi.yml
        type: OpenAPI
      - url: json-schema/lean-customer-schema.json
        type: JSONSchema
    description: >-
      Manage end-user customer records that Lean uses to anchor data and payment consents. Create customers with an
      app_user_id, list customers, and retrieve a customer by ID or by app_user_id.
  - aid: lean-tech:lean-entities-api
    name: Lean Entities API
    tags:
      - Entities
      - Open Banking
      - Consents
    humanURL: https://docs.leantech.me/reference/entities
    properties:
      - url: https://docs.leantech.me/reference/entities
        type: Documentation
      - url: openapi/lean-entities-api-openapi.yml
        type: OpenAPI
    description: >-
      Entities represent a customer's authenticated connection to a single bank, returned after a successful LinkSDK
      consent. List entities for a customer, retrieve a single entity by ID, or query entities across a date range.
  - aid: lean-tech:lean-data-api
    name: Lean Data API
    tags:
      - Open Banking
      - Account Information
      - Transactions
      - Balances
      - Identity
    humanURL: https://docs.leantech.me/reference/data-api
    properties:
      - url: https://docs.leantech.me/reference/data-api
        type: Documentation
      - url: openapi/lean-data-api-openapi.yml
        type: OpenAPI
      - url: json-schema/lean-account-schema.json
        type: JSONSchema
      - url: json-schema/lean-transaction-schema.json
        type: JSONSchema
      - url: json-ld/lean-tech-context.jsonld
        type: JSONLD
    description: >-
      Raw bank-account data retrieval (v2) returning accounts, transactions, balances, beneficiaries, standing orders,
      scheduled payments, direct debits, and identity, plus manual data refresh triggers and refresh status. Available
      after an Account Information consent has been collected via the LinkSDK.
  - aid: lean-tech:lean-insights-api
    name: Lean Insights API
    tags:
      - Open Banking
      - Insights
      - Income
      - Expenses
      - Cashflows
    humanURL: https://docs.leantech.me/reference/insights
    properties:
      - url: https://docs.leantech.me/reference/insights
        type: Documentation
      - url: openapi/lean-insights-api-openapi.yml
        type: OpenAPI
    description: >-
      Derived analytics over an entity's transaction history — income detection, expense categorisation, and cashflow
      summaries — for underwriting, affordability, and BFM use cases.
  - aid: lean-tech:lean-banks-api
    name: Lean Banks API
    tags:
      - Open Banking
      - Banks
      - Coverage
    humanURL: https://docs.leantech.me/reference/banks
    properties:
      - url: https://docs.leantech.me/reference/banks
        type: Documentation
      - url: openapi/lean-banks-api-openapi.yml
        type: OpenAPI
    description: >-
      List the banks Lean currently supports for Data and Payments per region, including identifiers, logos, and
      supported product surfaces (AIS, PIS, AOF, payouts).
  - aid: lean-tech:lean-verifications-api
    name: Lean Verifications API
    tags:
      - Verifications
      - Account Verification
      - Name Verification
      - KYC
    humanURL: https://docs.leantech.me/reference/verifications
    properties:
      - url: https://docs.leantech.me/reference/verifications
        type: Documentation
      - url: openapi/lean-verifications-api-openapi.yml
        type: OpenAPI
    description: >-
      Account Verification confirms ownership and validity of a bank account by IBAN or local account number across 27+
      countries (UAE, KSA, GB, US, EU, BR, IN, ID, NG, ZA, and more). Name Verification compares a supplied name against
      a payee record. Used for fraud reduction, payout pre-checks, and Confirmation of Payee.
  - aid: lean-tech:lean-payments-api
    name: Lean Payments API
    tags:
      - Open Banking
      - Payments
      - Pay by Bank
      - PIS
      - A2A
    humanURL: https://docs.leantech.me/reference/payments
    properties:
      - url: https://docs.leantech.me/reference/payments
        type: Documentation
      - url: openapi/lean-payments-api-openapi.yml
        type: OpenAPI
      - url: json-schema/lean-payment-intent-schema.json
        type: JSONSchema
    description: >-
      Single Instant Payment ("Pay by Bank") and Account-on-File (AOF) payment initiation, plus consent management.
      Create payment intents, retrieve payments by intent or payment id, list payment intents, and manage long-lived AOF
      consents with balance and history endpoints.
  - aid: lean-tech:lean-payment-sources-api
    name: Lean Payment Sources API
    tags:
      - Open Banking
      - Payment Sources
      - Tokenization
    humanURL: https://docs.leantech.me/reference/payment-sources
    properties:
      - url: https://docs.leantech.me/reference/payment-sources
        type: Documentation
      - url: openapi/lean-payment-sources-api-openapi.yml
        type: OpenAPI
    description: >-
      Tokenized representation of a customer's funding bank account once linked. List payment sources for a customer,
      retrieve a single source by ID, and delete a payment source to revoke its associated AOF consent.
  - aid: lean-tech:lean-payouts-api
    name: Lean Payouts API
    tags:
      - Open Banking
      - Payouts
      - Disbursements
      - A2A
    humanURL: https://docs.leantech.me/reference/payouts
    properties:
      - url: https://docs.leantech.me/reference/payouts
        type: Documentation
      - url: openapi/lean-payouts-api-openapi.yml
        type: OpenAPI
      - url: json-schema/lean-payout-schema.json
        type: JSONSchema
    description: >-
      Initiate outbound bank-to-bank payouts from corporate accounts to consumer or business beneficiaries. Create
      payout payments, list payouts, retrieve a payout intent, get per-payment history, and manage payout destinations
      (the beneficiary records that receive funds).
  - aid: lean-tech:lean-refunds-api
    name: Lean Refunds API
    tags:
      - Open Banking
      - Refunds
      - Payouts
    humanURL: https://docs.leantech.me/reference/refunds
    properties:
      - url: https://docs.leantech.me/reference/refunds
        type: Documentation
      - url: openapi/lean-refunds-api-openapi.yml
        type: OpenAPI
    description: >-
      Issue full or partial refunds against prior Pay by Bank payments. List refunds, create a new refund, process
      queued refunds, and retrieve the canonical list of refund reason codes.
