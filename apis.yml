description: >-
  Lean Technologies is a Middle East Open Banking and Open Finance infrastructure provider founded in 2019 and
  headquartered in the UAE. Lean offers regulated Account Information (AIS), Payment Initiation (PIS), payouts, refunds,
  account and name verifications, and derived insights across the UAE and Saudi Arabia, with verification coverage
  extending to 27+ countries globally. Lean holds an In-Principle Approval from the Central Bank of UAE for Open Finance
  Services (August 2025), a Major Payment Institution licence from the Saudi Central Bank (SAMA), and an FSP licence
  from the Abu Dhabi Global Market FSRA (no. 200033). The platform is SOC 2 Type II and ISO 27001:2022 certified and has
  processed AED 16B+ across 2M+ linked accounts. Investors include Sequoia, General Catalyst, Breyer Capital, Shorooq,
  Raed, BCV, and Liberty City.
