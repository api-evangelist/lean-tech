naftiko: 1.0.0-alpha2
info:
  label: Lean Banks API — Banks
  description: 'Lean Banks — list supported banks per country and capability surface.'
  tags:
  - Lean
  - Banks
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    LEAN_API_TOKEN: LEAN_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: banks-banks
    baseUri: https://api2.leantech.me
    description: Lean Banks API — Banks business capability backed by Lean Technologies APIs.
    resources:
    - name: banks
      path: /banks/v1/
      operations:
      - name: listBanks
        method: GET
        description: Lean List Banks
        outputRawFormat: json
        inputParameters:
        - name: country
          in: query
          type: string
          required: false
        - name: capability
          in: query
          type: string
          required: false
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: 'Bearer {{env.LEAN_API_TOKEN}}'
      placement: header
  exposes:
  - type: rest
    namespace: banks-banks-rest
    port: 8080
    description: REST adapter for Lean Banks API — Banks.
    resources:
    - path: /v1/banks/v1/
      name: banks
      operations:
      - method: GET
        name: listBanks
        description: Lean List Banks
        call: banks-banks.listBanks
        with:
          country: rest.query.country
          capability: rest.query.capability
  - type: mcp
    namespace: banks-banks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Lean Banks API — Banks.
    tools:
    - name: lean-listbanks
      description: Lean List Banks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: banks-banks.listBanks
      with:
        country: tools.country
        capability: tools.capability
